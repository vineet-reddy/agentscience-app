<svg width="300" height="120" viewBox="0 0 300 120" xmlns="http://www.w3.org/2000/svg">
  <!-- Flask icon on the left, properly sized and centered vertically -->
  <g transform="translate(48, 56) scale(0.19)">
    <!-- Flask body -->
    <path
      d="M-72,-260 L-72,-100 L-205,190 Q-215,222 -180,238 L180,238 Q215,222 205,190 L72,-100 L72,-260"
      fill="none"
      stroke="#1A1A1A"
      stroke-width="13"
      stroke-linejoin="round"
      stroke-linecap="round"
    />
    <!-- Flask rim -->
    <line x1="-102" y1="-260" x2="102" y2="-260"
      stroke="#1A1A1A"
      stroke-width="13"
      stroke-linecap="round"
    />

    <!-- Constellation edges -->
    <line x1="-50" y1="60" x2="40" y2="145" stroke="#3b5bdb" stroke-width="5.5" opacity="0.30"/>
    <line x1="40" y1="145" x2="90" y2="78" stroke="#3b5bdb" stroke-width="5.5" opacity="0.30"/>
    <line x1="-50" y1="60" x2="-108" y2="145" stroke="#3b5bdb" stroke-width="5.5" opacity="0.30"/>
    <line x1="-108" y1="145" x2="40" y2="145" stroke="#3b5bdb" stroke-width="4.5" opacity="0.22"/>
    <line x1="40" y1="145" x2="-24" y2="195" stroke="#3b5bdb" stroke-width="4.5" opacity="0.22"/>
    <line x1="-50" y1="60" x2="18" y2="20" stroke="#3b5bdb" stroke-width="4.5" opacity="0.22"/>
    <line x1="90" y1="78" x2="18" y2="20" stroke="#3b5bdb" stroke-width="4" opacity="0.18"/>
    <line x1="-108" y1="145" x2="-24" y2="195" stroke="#3b5bdb" stroke-width="4" opacity="0.18"/>

    <!-- Constellation nodes -->
    <circle cx="-50" cy="60" r="17" fill="#3b5bdb" opacity="0.85"/>
    <circle cx="40" cy="145" r="20" fill="#3b5bdb" opacity="0.92"/>
    <circle cx="90" cy="78" r="14" fill="#3b5bdb" opacity="0.70"/>
    <circle cx="-108" cy="145" r="15" fill="#3b5bdb" opacity="0.75"/>
    <circle cx="-24" cy="195" r="12" fill="#3b5bdb" opacity="0.60"/>
    <circle cx="18" cy="20" r="11" fill="#3b5bdb" opacity="0.55"/>
  </g>

  <!-- Stacked text, vertically centered with the flask -->
  <text x="102" y="50" font-family="'Georgia', 'Times New Roman', serif" font-size="30" fill="#1A1A1A" letter-spacing="0.3">Agent</text>
  <text x="102" y="82" font-family="'Georgia', 'Times New Roman', serif" font-size="30" fill="#1A1A1A" letter-spacing="0.3">Science</text>
</svg>
