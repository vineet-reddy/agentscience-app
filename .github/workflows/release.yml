name: Release Desktop

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

defaults:
  run:
    working-directory: agentscience-app

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.release_meta.outputs.version }}
      tag: ${{ steps.release_meta.outputs.tag }}
      is_prerelease: ${{ steps.release_meta.outputs.is_prerelease }}
      make_latest: ${{ steps.release_meta.outputs.make_latest }}
      ref: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - id: release_meta
        name: Resolve release version
        shell: bash
        run: |
          raw="${GITHUB_REF_NAME}"
          version="${raw#v}"
          if [[ ! "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+([.-][0-9A-Za-z.-]+)?$ ]]; then
            echo "Invalid release version: $raw" >&2
            exit 1
          fi

          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"
          if [[ "$version" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "is_prerelease=false" >> "$GITHUB_OUTPUT"
            echo "make_latest=true" >> "$GITHUB_OUTPUT"
          else
            echo "is_prerelease=true" >> "$GITHUB_OUTPUT"
            echo "make_latest=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: agentscience-app/package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: agentscience-app/package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun run test

  build:
    name: Build ${{ matrix.label }}
    needs: preflight
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: macOS arm64
            runner: macos-14
            platform: mac
            target: dmg
            arch: arm64
          - label: macOS x64
            runner: macos-15-intel
            platform: mac
            target: dmg
            arch: x64
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.ref }}
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: agentscience-app/package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: agentscience-app/package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile --ignore-scripts

      - name: Align package versions to release version
        run: node scripts/update-release-package-versions.ts "${{ needs.preflight.outputs.version }}"

      - name: Build desktop artifact
        shell: bash
        env:
          CSC_LINK: ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          args=(
            --platform "${{ matrix.platform }}"
            --target "${{ matrix.target }}"
            --arch "${{ matrix.arch }}"
            --build-version "${{ needs.preflight.outputs.version }}"
            --verbose
          )

          has_all() {
            for value in "$@"; do
              if [[ -z "$value" ]]; then
                return 1
              fi
            done
            return 0
          }

          if [[ "${{ matrix.platform }}" == "mac" ]]; then
            ulimit -n 65536 || ulimit -n 16384 || true
            echo "Open file limit: $(ulimit -n)"

            if has_all "$CSC_LINK" "$CSC_KEY_PASSWORD" "$APPLE_API_KEY" "$APPLE_API_KEY_ID" "$APPLE_API_ISSUER"; then
              key_path="$RUNNER_TEMP/AuthKey_${APPLE_API_KEY_ID}.p8"
              printf '%s' "$APPLE_API_KEY" > "$key_path"
              export APPLE_API_KEY="$key_path"
              echo "macOS signing enabled."
              args+=(--signed)
            else
              echo "macOS signing disabled (missing one or more Apple signing secrets)."
            fi
          fi

          bun run dist:desktop:artifact -- "${args[@]}"

      - name: Collect release assets
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p release-publish

          shopt -s nullglob
          for pattern in \
            "release/*.dmg" \
            "release/*.zip" \
            "release/*.blockmap" \
            "release/latest*.yml"; do
            for file in $pattern; do
              cp "$file" release-publish/
            done
          done

          if [[ "${{ matrix.platform }}" == "mac" && "${{ matrix.arch }}" != "arm64" ]]; then
            if [[ -f release-publish/latest-mac.yml ]]; then
              mv release-publish/latest-mac.yml "release-publish/latest-mac-${{ matrix.arch }}.yml"
            fi
          fi

          if [[ "${{ matrix.platform }}" == "mac" ]]; then
            shopt -s nullglob
            dmg_files=(release-publish/Agent-Science-*-${{ matrix.arch }}.dmg)
            if (( ${#dmg_files[@]} > 0 )); then
              if [[ "${{ matrix.arch }}" == "arm64" ]]; then
                cp "${dmg_files[0]}" release-publish/Agent-Science-mac-arm64.dmg
              else
                cp "${dmg_files[0]}" release-publish/Agent-Science-mac-intel.dmg
              fi
            fi
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-${{ matrix.platform }}-${{ matrix.arch }}
          path: agentscience-app/release-publish/*
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [preflight, build]
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.preflight.outputs.ref }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: agentscience-app/package.json

      - name: Download all desktop artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: desktop-*
          merge-multiple: true
          path: agentscience-app/release-assets

      - name: Merge macOS updater manifests
        run: |
          node scripts/merge-mac-update-manifests.ts \
            release-assets/latest-mac.yml \
            release-assets/latest-mac-x64.yml
          rm -f release-assets/latest-mac-x64.yml

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.preflight.outputs.tag }}
          target_commitish: ${{ needs.preflight.outputs.ref }}
          name: AgentScience v${{ needs.preflight.outputs.version }}
          generate_release_notes: true
          prerelease: ${{ needs.preflight.outputs.is_prerelease }}
          make_latest: ${{ needs.preflight.outputs.make_latest }}
          files: |
            agentscience-app/release-assets/*.dmg
            agentscience-app/release-assets/*.zip
            agentscience-app/release-assets/*.blockmap
            agentscience-app/release-assets/latest*.yml
          fail_on_unmatched_files: true

  finalize:
    name: Finalize release
    needs: [preflight, release]
    runs-on: ubuntu-24.04
    steps:
      - id: release_app_config
        name: Check finalize automation secrets
        shell: bash
        working-directory: .
        env:
          RELEASE_APP_ID: ${{ secrets.RELEASE_APP_ID }}
          RELEASE_APP_PRIVATE_KEY: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
        run: |
          if [[ -n "$RELEASE_APP_ID" && -n "$RELEASE_APP_PRIVATE_KEY" ]]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "Release app credentials are not configured; using the workflow GitHub token for version-bump finalization."
          fi

      - id: app_token
        name: Mint release app token
        if: steps.release_app_config.outputs.enabled == 'true'
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout with release app token
        if: steps.release_app_config.outputs.enabled == 'true'
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          token: ${{ steps.app_token.outputs.token }}
          persist-credentials: true

      - name: Checkout with workflow token
        if: steps.release_app_config.outputs.enabled != 'true'
        uses: actions/checkout@v6
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true

      - id: app_bot
        name: Resolve GitHub App bot identity
        if: steps.release_app_config.outputs.enabled == 'true'
        env:
          GH_TOKEN: ${{ steps.app_token.outputs.token }}
          APP_SLUG: ${{ steps.app_token.outputs.app-slug }}
        run: |
          user_id="$(gh api "/users/${APP_SLUG}[bot]" --jq .id)"
          echo "name=${APP_SLUG}[bot]" >> "$GITHUB_OUTPUT"
          echo "email=${user_id}+${APP_SLUG}[bot]@users.noreply.github.com" >> "$GITHUB_OUTPUT"

      - id: workflow_bot
        name: Resolve workflow bot identity
        if: steps.release_app_config.outputs.enabled != 'true'
        run: |
          echo "name=github-actions[bot]" >> "$GITHUB_OUTPUT"
          echo "email=41898282+github-actions[bot]@users.noreply.github.com" >> "$GITHUB_OUTPUT"

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: agentscience-app/package.json

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: agentscience-app/package.json

      - id: update_versions
        name: Update version strings
        env:
          RELEASE_VERSION: ${{ needs.preflight.outputs.version }}
        run: node scripts/update-release-package-versions.ts "$RELEASE_VERSION" --github-output

      - name: Format package.json files
        if: steps.update_versions.outputs.changed == 'true'
        run: bunx oxfmt apps/server/package.json apps/desktop/package.json apps/web/package.json packages/contracts/package.json

      - name: Refresh lockfile
        if: steps.update_versions.outputs.changed == 'true'
        run: bun install --lockfile-only --ignore-scripts

      - name: Commit and push version bump
        if: steps.update_versions.outputs.changed == 'true'
        shell: bash
        env:
          RELEASE_TAG: ${{ needs.preflight.outputs.tag }}
        run: |
          if git diff --quiet -- apps/server/package.json apps/desktop/package.json apps/web/package.json packages/contracts/package.json bun.lock; then
            echo "No version changes to commit."
            exit 0
          fi

          git config user.name "${{ steps.app_bot.outputs.name || steps.workflow_bot.outputs.name }}"
          git config user.email "${{ steps.app_bot.outputs.email || steps.workflow_bot.outputs.email }}"

          git add apps/server/package.json apps/desktop/package.json apps/web/package.json packages/contracts/package.json bun.lock
          git commit -m "chore(release): prepare $RELEASE_TAG"
          git push origin HEAD:main
